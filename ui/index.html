<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VeraAltin - Canlı Fiyat Takibi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/6.0.1/signalr.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #ececf1;
        }

        .card {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            width: 350px;
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        h2 {
            color: #2d3436;
            margin-bottom: 1.5rem;
            font-size: 1.5rem;
        }

        .price-section {
            margin-bottom: 20px;
        }

        small {
            color: #636e72;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
            font-size: 0.7rem;
        }

        #price {
            font-size: 1.8rem;
            color: #2d3436;
            margin-top: 5px;
        }

        .exchange-rate {
            padding: 12px;
            background: #fff9e6;
            border-radius: 12px;
            margin: 20px 0;
            border: 1px solid #ffeaa7;
        }

        #usd-try {
            color: #f39c12;
            font-weight: bold;
            font-size: 1rem;
            margin-top: 4px;
        }

        hr {
            border: 0;
            border-top: 1px solid #eee;
            margin: 20px 0;
        }

        #tl-price {
            font-size: 2.8rem;
            color: #d4af37;
            /* Altın Rengi */
            font-weight: 800;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.05);
        }

        .update-time {
            font-size: 0.85rem;
            color: #b2bec3;
            margin-top: 20px;
            font-style: italic;
        }

        /* Veri geldiğinde yanıp sönme efekti */
        .pulse {
            animation: pulse-animation 0.5s ease-in-out;
        }

        @keyframes pulse-animation {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }

            100% {
                opacity: 1;
            }
        }
    </style>
</head>

<body>

    <div class="card">
        <h2>Vera Altın Takip</h2>

        <div class="price-section">
            <small>ONS Fiyatı (USD)</small>
            <div id="price">$0,00</div>
        </div>

        <div class="exchange-rate">
            <small>Güncel Kur (USD/TRY)</small>
            <div id="usd-try">Yükleniyor...</div>
        </div>

        <hr>

        <div class="price-section">
            <small>GRAM ALTIN (TL)</small>
            <div id="tl-price">₺0,00</div>
        </div>

        <div class="update-time" id="time">Bağlantı bekleniyor...</div>
    </div>

    <script>
        let currentUsdTry = 34.50;

        // 1. Dolar Kuru Güncelleme
        async function updateExchangeRate() {
            try {
                const response = await fetch("https://open.er-api.com/v6/latest/USD");
                const data = await response.json();
                currentUsdTry = data.rates.TRY;
                document.getElementById("usd-try").innerText = "1 $ = " + currentUsdTry.toLocaleString('tr-TR', { minimumFractionDigits: 4 }) + " ₺";
            } catch (err) {
                console.error("Kur çekilemedi:", err);
            }
        }

        updateExchangeRate();
        setInterval(updateExchangeRate, 300000); // 5 dakikada bir

        // 2. SignalR Bağlantısı
        const connection = new signalR.HubConnectionBuilder()
            .withUrl("http://localhost:5184/goldHub")
            .withAutomaticReconnect() // Bağlantı koparsa otomatik dene
            .build();

        connection.on("ReceiveGoldPrice", (goldData) => {
            const usdPrice = goldData.price || goldData.Price;
            const gramGoldTL = (usdPrice / 31.10347) * currentUsdTry;

            // Elementleri Güncelle
            const priceEl = document.getElementById("price");
            const tlPriceEl = document.getElementById("tl-price");

            priceEl.innerText = usdPrice.toLocaleString('en-US', { style: 'currency', currency: 'USD' });
            tlPriceEl.innerText = gramGoldTL.toLocaleString('tr-TR', { style: 'currency', currency: 'TRY' });
            document.getElementById("time").innerText = "Son Güncelleme: " + new Date().toLocaleTimeString();

            // Efekt ekle
            tlPriceEl.classList.remove("pulse");
            void tlPriceEl.offsetWidth; // DOM'u tetikle
            tlPriceEl.classList.add("pulse");
        });

        async function start() {
            try {
                await connection.start();
                console.log("SignalR Bağlantısı Başarılı!");
                document.getElementById("time").innerText = "Veri bekleniyor...";
            } catch (err) {
                console.log("Bağlantı hatası:", err);
                setTimeout(start, 5000);
            }
        }

        start();
    </script>
</body>

</html>
