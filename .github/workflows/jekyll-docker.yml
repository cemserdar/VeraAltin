name: Deploy UI to GitHub Pages

on:
  push:
    branches: ["main"]
  # Actions sekmesinden manuel olarak da tetikleyebilmeniz için:
  workflow_dispatch:

# GitHub Pages'e yükleme yapabilmek için gerekli token izinleri
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda birden fazla dağıtımın çakışmasını önler
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload UI Folder Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # ÖNEMLİ: Sadece ui klasörünün içeriğini paketliyoruz
          path: './ui'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
